spring:
  application:
    name: cloudcost-sentinel

  datasource:
    url: jdbc:postgresql://localhost:5433/cloudcost_db
    username: cloudcost_user
    password: cloudcost_pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
