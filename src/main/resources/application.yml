spring:
  application:
    name: cloudcost-sentinel

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/cloudcost_db}
    username: ${DATABASE_USERNAME:cloudcost_user}
    password: ${DATABASE_PASSWORD:cloudcost_pass}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
